---
- name: Download Helm archive
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: "/tmp/helm-{{ helm_version }}.tar.gz"
    force: false

- name: Extract Helm binary (idempotent -- skipped if /usr/local/bin/helm exists)
  ansible.builtin.unarchive:
    src: "/tmp/helm-{{ helm_version }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    extra_opts:
      - "--strip-components=1"
      - "linux-amd64/helm"
    creates: /usr/local/bin/helm

- name: Register Helm repositories
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
    state: present
  loop: "{{ helm_repositories }}"

- name: Deploy Helm releases
  kubernetes.core.helm:
    name: "{{ item.name }}"
    chart_ref: "{{ item.chart }}"
    chart_version: "{{ item.chart_version }}"
    release_namespace: "{{ item.namespace }}"
    create_namespace: false
    values: "{{ item.values | default({}) }}"
    wait: true
    kubeconfig: /etc/rancher/k3s/k3s.yaml
  loop: "{{ helm_releases }}"
