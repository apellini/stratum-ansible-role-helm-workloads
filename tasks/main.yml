---
- name: Check installed Helm version
  ansible.builtin.command: "{{ helm_binary_path }} version --short"
  register: _helm_installed_version
  changed_when: false
  failed_when: false

- name: Download Helm archive
  ansible.builtin.get_url:
    url: "https://get.helm.sh/helm-{{ helm_version }}-linux-amd64.tar.gz"
    dest: "/tmp/helm-{{ helm_version }}.tar.gz"
    mode: "0644"
    force: false
  when: _helm_installed_version.rc != 0 or helm_version not in _helm_installed_version.stdout

- name: Extract Helm binary
  ansible.builtin.unarchive:
    src: "/tmp/helm-{{ helm_version }}.tar.gz"
    dest: /usr/local/bin
    remote_src: true
    extra_opts:
      - "--strip-components=1"
      - "linux-amd64/helm"
  when: _helm_installed_version.rc != 0 or helm_version not in _helm_installed_version.stdout

- name: Register Helm repositories
  kubernetes.core.helm_repository:
    name: "{{ item.name }}"
    repo_url: "{{ item.url }}"
    state: present
    binary_path: "{{ helm_binary_path }}"
  loop: "{{ helm_repositories }}"

- name: Clear pending Helm releases
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      status=$({{ helm_binary_path }} status {{ item.name }} -n {{ item.namespace }} -o json 2>/dev/null \
               | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])" 2>/dev/null || true)
      case "$status" in
        pending-install|pending-upgrade|pending-rollback)
          {{ helm_binary_path }} rollback {{ item.name }} -n {{ item.namespace }} 2>/dev/null \
            || {{ helm_binary_path }} uninstall {{ item.name }} -n {{ item.namespace }}
          ;;
      esac
    executable: /bin/bash
  loop: "{{ helm_releases }}"
  changed_when: false
  failed_when: false
  environment:
    PATH: /usr/local/bin:/usr/local/sbin:/usr/bin:/usr/sbin:/bin:/sbin
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml

- name: Deploy Helm releases
  kubernetes.core.helm:
    name: "{{ item.name }}"
    chart_ref: "{{ item.chart }}"
    chart_version: "{{ item.chart_version }}"
    release_namespace: "{{ item.namespace }}"
    create_namespace: false
    values: "{{ item['values'] | default({}) }}"
    wait: "{{ item.wait | default(true) }}"
    wait_timeout: "{{ item.wait_timeout | default(helm_wait_timeout) }}"
    kubeconfig: /etc/rancher/k3s/k3s.yaml
    binary_path: "{{ helm_binary_path }}"
  loop: "{{ helm_releases }}"
